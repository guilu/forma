# Test profile (FOR-83): run the Flyway migration baseline against an in-memory
# H2 database in PostgreSQL-compatibility mode. This lets `./gradlew test` boot
# the context and exercise migrations without Docker or a real PostgreSQL server.
# Real environments use the PostgreSQL datasource from the base application.yml.
spring:
  datasource:
    url: jdbc:h2:mem:forma;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

# Withings OAuth test fixtures (FOR-131). NOT real secrets: client id/secret are placeholder
# strings (WithingsOAuthAdapterTest/JdbcIntegrationTokenStoreTest never call the live Withings
# API — recorded fixtures / a fake transport only, per AGENTS.md and tests.md). The encryption key
# is a throwaway value generated once with `openssl rand -base64 32` for this test suite only; it
# is not used by any real environment and losing/rotating it has zero production impact.
forma:
  integrations:
    withings:
      client-id: test-client-id
      client-secret: test-client-secret
      token-encryption-key: "loqw42BT5R/c7R+x3c4TCbQDKQayhpkVqnVtWPpO1c8="

  # Progress-photo private storage (FOR-140). Defaults to a build/ subdirectory (gitignored,
  # cleaned by `./gradlew clean`) so the test suite never writes under a developer's real
  # $FORMA_PROGRESS_PHOTOS_DIR/$HOME, even for a @SpringBootTest that doesn't explicitly override
  # it. Tests asserting real file behavior (e.g. ProgressPhotoEndToEndTest) still override this
  # with an isolated @TempDir via @DynamicPropertySource so parallel test runs never collide.
  progress:
    photos:
      storage-dir: build/test-data/progress-photos
