spring:
  application:
    name: forma-backend

  # PostgreSQL access (FOR-83, ADR-003). Environment-driven with local defaults
  # that match the Docker Compose service (FOR-82); SPRING_DATASOURCE_* env vars
  # override these for containers and other environments.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forma}
    username: ${SPRING_DATASOURCE_USERNAME:forma}
    password: ${SPRING_DATASOURCE_PASSWORD:forma_local_password}

  # Schema evolution is migration-driven (ADR-003). Flyway runs pending
  # migrations from db/migration automatically on application startup.
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Progress-photo uploads (FOR-140). Raised above the framework default (1 MB) so it never
  # rejects a legitimate photo below ProgressPhotoService's own 5 MB content-length check; kept
  # close to that same 5 MB so an oversized request is still rejected quickly at the servlet
  # level, before any multipart parsing work, rather than only relying on the application-level
  # check. Both layers map to the same 400 VALIDATION_ERROR shape (GlobalExceptionHandler).
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

# Cross-origin access for the browser frontend (FOR-17/FOR-18/FOR-19). The SPA is
# served from a different origin than the API, so the API must allow it explicitly
# (no production wildcard — AGENTS.md). Defaults cover local dev (Vite :5173 and
# the compose frontend :3000); real environments override with their exact origin.
forma:
  cors:
    allowed-origins: ${FORMA_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  # Withings OAuth (FOR-131, ADR-004). client-id/client-secret/token-encryption-key are secrets:
  # they default to empty placeholders here and MUST be provided via environment variables in any
  # real environment (WITHINGS_CLIENT_ID, WITHINGS_CLIENT_SECRET, WITHINGS_TOKEN_ENC_KEY) —
  # AGENTS.md forbids committing secrets, so no real value is ever written here. A blank/missing
  # value does not prevent the application from starting (see AesGcmTokenCipher/WithingsOAuthAdapter
  # javadoc); a real Withings connect/callback attempt without one fails loudly at that point
  # instead. Generate the encryption key once per environment with: openssl rand -base64 32
  integrations:
    withings:
      client-id: ${WITHINGS_CLIENT_ID:}
      client-secret: ${WITHINGS_CLIENT_SECRET:}
      redirect-uri: ${WITHINGS_REDIRECT_URI:https://forma.diegobarrioh.dev/auth}
      scope: user.metrics
      authorize-url: https://account.withings.com/oauth2_user/authorize2
      token-url: https://wbsapi.withings.net/v2/oauth2
      # Measure API (Getmeas, FOR-132) — real body-composition sync, bearer-token authenticated,
      # distinct from the OAuth token endpoint above.
      measure-url: https://wbsapi.withings.net/measure
      token-encryption-key: ${WITHINGS_TOKEN_ENC_KEY:}

  # Progress-photo private binary storage (FOR-140, spec FOR-140 Storage decision Option A: a
  # filesystem-backed private directory for this MVP — never a web-served/static path; see
  # FilesystemProgressPhotoStore). Defaults to a per-user directory outside the repo/container
  # image; FORMA_PROGRESS_PHOTOS_DIR overrides it for containers/deployments that mount a
  # persistent volume there. A container without a mounted volume loses photos on restart — a
  # known MVP limitation (documented in the FOR-140 PR), not an oversight.
  progress:
    photos:
      storage-dir: ${FORMA_PROGRESS_PHOTOS_DIR:${user.home}/.forma/progress-photos}

  # Legacy placeholder-account activation (FOR-145, ADR-012 / LegacyUserBootstrap). Unset by
  # default — the migration V26 placeholder row (the pre-auth single-user data owner) stays
  # unusable until a real environment provides this via FORMA_BOOTSTRAP_LEGACY_USER_PASSWORD.
  # Never a literal value here (AGENTS.md: "Do not commit secrets").
  bootstrap:
    legacy-user-password: ${FORMA_BOOTSTRAP_LEGACY_USER_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}
  # API error safety baseline (FOR-88, ADR-005): never leak stack traces or raw
  # exception messages to clients. The GlobalExceptionHandler owns the response
  # shape; these settings harden the container's default error path too.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

  # Session-cookie auth (FOR-145, ADR-012). http-only stops JS reading the session id
  # (XSS-mitigation) and same-site=lax is the CSRF baseline. `secure` is deliberately NOT forced
  # here: Tomcat then defaults it to the request's own scheme (false over local plain HTTP dev,
  # true once a request actually arrives over HTTPS), so local development stays usable without
  # TLS. Real HTTPS-only environments force it explicitly (application-prod.yml); the automated
  # test suite also forces it explicitly (application-test.yml) so the FOR-145 spec's
  # "httpOnly+Secure+SameSite=Lax" scenario is exercised deterministically.
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

# Observability baseline (ADR-008): expose health only and never leak internal
# configuration or details. Broader API/error handling is owned by FOR-88.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Structured logging baseline (FOR-91, ADR-008). Every log line carries the
# request correlation id (from CorrelationIdFilter's MDC) after the level, so
# local logs stay readable: "LEVEL [forma-backend,<correlationId>] logger : msg".
# Never log secrets, tokens or full personal health payloads.
logging:
  pattern:
    level: "%5p [${spring.application.name:forma-backend},%X{correlationId:-}]"
