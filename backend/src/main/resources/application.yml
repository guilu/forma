spring:
  application:
    name: forma-backend

  # PostgreSQL access (FOR-83, ADR-003). Environment-driven with local defaults
  # that match the Docker Compose service (FOR-82); SPRING_DATASOURCE_* env vars
  # override these for containers and other environments.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forma}
    username: ${SPRING_DATASOURCE_USERNAME:forma}
    password: ${SPRING_DATASOURCE_PASSWORD:forma_local_password}

  # Schema evolution is migration-driven (ADR-003). Flyway runs pending
  # migrations from db/migration automatically on application startup.
  flyway:
    enabled: true
    locations: classpath:db/migration

# Cross-origin access for the browser frontend (FOR-17/FOR-18/FOR-19). The SPA is
# served from a different origin than the API, so the API must allow it explicitly
# (no production wildcard — AGENTS.md). Defaults cover local dev (Vite :5173 and
# the compose frontend :3000); real environments override with their exact origin.
forma:
  cors:
    allowed-origins: ${FORMA_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}
  # API error safety baseline (FOR-88, ADR-005): never leak stack traces or raw
  # exception messages to clients. The GlobalExceptionHandler owns the response
  # shape; these settings harden the container's default error path too.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# Observability baseline (ADR-008): expose health only and never leak internal
# configuration or details. Broader API/error handling is owned by FOR-88.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Structured logging baseline (FOR-91, ADR-008). Every log line carries the
# request correlation id (from CorrelationIdFilter's MDC) after the level, so
# local logs stay readable: "LEVEL [forma-backend,<correlationId>] logger : msg".
# Never log secrets, tokens or full personal health payloads.
logging:
  pattern:
    level: "%5p [${spring.application.name:forma-backend},%X{correlationId:-}]"
