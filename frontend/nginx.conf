# Serves the FORMA SPA (FOR-82). The unprivileged nginx image listens on 8080.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: serve index.html for unknown paths so React Router
    # can resolve them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
