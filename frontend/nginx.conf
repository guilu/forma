# Serves the FORMA SPA and reverse-proxies the API (FOR-82). The unprivileged
# nginx image listens on 8080.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests go to the backend container. From the browser's perspective
    # this is same-origin, so no absolute backend host is baked into the SPA
    # bundle and no CORS is needed. `backend` resolves via the compose network;
    # the full `/api/...` path is preserved (no trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side routing: serve index.html for unknown paths so React Router
    # can resolve them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
