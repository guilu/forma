# SonarCloud automatic-analysis configuration (FORMA).
#
# SonarCloud's automatic analysis reads THIS file (.sonarcloud.properties), not
# sonar-project.properties, which is only used by CI-based analysis.
#
# Why we exclude Flyway migrations from analysis:
# FORMA's database is PostgreSQL (ADR-003); tests run on H2 in PostgreSQL
# compatibility mode. SonarCloud ships SQL analyzers for Oracle PL/SQL and
# Microsoft T-SQL only — it has no PostgreSQL dialect. Running those rules over
# PostgreSQL DDL yields dialect false positives, e.g. "Use VARCHAR2 instead of
# VARCHAR" (VARCHAR2 is an Oracle-only type that PostgreSQL does not support and
# that would break the migration if applied).
#
# Flyway migrations are validated by the real PostgreSQL/H2 engine at application
# startup and by integration tests (see JdbcBodyMeasurementRepositoryTest,
# MigrationBaselineTest), so excluding them from SonarCloud loses no real signal.
sonar.exclusions=backend/src/main/resources/db/migration/**
