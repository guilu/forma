# FORMA CI quality gate (FOR-84).
#
# First pipeline: builds and tests the backend and frontend on every pull
# request and on pushes to main. Backend and frontend run as independent jobs,
# so either one failing fails the pipeline. Commands mirror what developers run
# locally (see docs/local-development.md). Backend lint/format runs via Spotless
# inside `./gradlew build`; frontend lint/format run as explicit steps (FOR-85).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref to keep small PRs fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
